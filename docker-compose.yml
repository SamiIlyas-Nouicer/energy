services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: energy_zookeeper
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
      - ZOOKEEPER_DATA_DIR=/tmp/zookeeper/data
      - ZOOKEEPER_LOG_DIR=/tmp/zookeeper/log
    networks:
      - energy_network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: energy_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://energy_kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - energy_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: energy_kafka_ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=energy-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=energy_kafka:29092
    networks:
      - energy_network

  minio:
    image: minio/minio:latest
    container_name: energy_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - energy_network

  # --- Day 3: Spark Cluster ---
  spark-master:
    image: apache/spark:3.5.0
    container_name: energy_spark_master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "8081:8080"
      - "7077:7077"
    networks:
      - energy_network

  spark-worker:
    image: apache/spark:3.5.0
    container_name: energy_spark_worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    networks:
      - energy_network

  # --- Day 5: MLflow Tracking Server ---
  # --- Day 5: MLflow Tracking Server ---
  # --- Day 5: MLflow Tracking Server (Official Image) ---
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: energy_mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root mlflow-artifacts:/ --artifacts-destination /mlflow/artifacts --host 0.0.0.0
    volumes:
      - /mlflow:/mlflow
    networks:
      - energy_network

volumes:
  minio_data:
  mlflow_data:


networks:
  energy_network:
    driver: bridge
