services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: energy_zookeeper
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
      - ZOOKEEPER_DATA_DIR=/tmp/zookeeper/data
      - ZOOKEEPER_LOG_DIR=/tmp/zookeeper/log
    networks:
      - energy_network
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: energy_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://energy_kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - energy_network
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: energy_kafka_ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=energy-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=energy_kafka:29092
    networks:
      - energy_network

  minio:
    image: minio/minio:latest
    container_name: energy_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - energy_network

  # --- Spark Cluster ---
  spark-master:
    image: apache/spark:3.5.0
    container_name: energy_spark_master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "8081:8080"
      - "7077:7077"
    networks:
      - energy_network

  spark-worker:
    image: apache/spark:3.5.0
    container_name: energy_spark_worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    networks:
      - energy_network

  # --- Day 5: MLflow Tracking Server ---
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: energy_mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root mlflow-artifacts:/
      --artifacts-destination /mlflow/artifacts
      --host 0.0.0.0
    volumes:
      - /mlflow:/mlflow
    networks:
      - energy_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 15s
      timeout: 5s
      retries: 5

  # --- Day 6: Prediction API ---
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: energy_api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - energy_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: on-failure

  # --- Day 6: Streamlit Dashboard ---
  dashboard:
    build:
      context: .
      dockerfile: src/dashboard/Dockerfile
    container_name: energy_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - energy_network
    restart: on-failure

  # --- Day 6: Ingestion Layer ---
  ingestion:
    build:
      context: .
      dockerfile: src/ingestion/Dockerfile
    container_name: energy_ingestion
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=energy_kafka:29092
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - energy_network
    restart: on-failure

volumes:
  minio_data:
  mlflow_data:

networks:
  energy_network:
    driver: bridge
